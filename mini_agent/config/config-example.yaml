# Mini Agent Configuration Example
# 
# Configuration File Locations (in priority order):
# 1) mini_agent/config/config.yaml - Development mode (current directory)
# 2) ~/.mini-agent/config/config.yaml - User config directory
# 3) <package>/mini_agent/config/config.yaml - Package installation directory
#
# To use this config:
# - Copy this file to one of the above locations as config.yaml
# - Fill in your API key and customize settings as needed
# - All config files (config.yaml, mcp.json, system_prompt.md) are in the same directory

# ===== LLM Configuration =====
# Phase 3: pool-only. Declare every endpoint you want available under
# `pool:` below — top-level `api_key` / `api_base` / `model` / `provider`
# are no longer accepted and cause a loud `ValueError` at startup.
#
# MiniMax API endpoints:
# - Global: https://platform.minimax.io -> api_base: https://api.minimax.io
# - China:  https://platform.minimaxi.com -> api_base: https://api.minimaxi.com
# For MiniMax API the suffix (/anthropic or /v1) is auto-appended based on provider.
# For third-party APIs (e.g., https://api.siliconflow.cn/v1), api_base is used as-is.

# ===== Retry Configuration =====
retry:
  enabled: true           # Enable retry mechanism
  max_retries: 3          # Maximum number of retries
  initial_delay: 1.0      # Initial delay time (seconds)
  max_delay: 60.0         # Maximum delay time (seconds)
  exponential_base: 2.0   # Exponential backoff base (delay = initial_delay * base^attempt)

# ===== Routing + Breaker Configuration =====
# The router picks among pool nodes in descending priority, failing
# over on transient / rate-limit / auth errors. Circuit breaker tracks
# per-node health — after `failure_threshold` consecutive failures the
# node is *open* for `cooldown_seconds`, after which one half-open
# probe decides whether to fully recover.
routing:
  strategy: priority             # Phase 3 still supports only `priority`.
  cross_family_fallback: false   # Phase 3: opt-in Anthropic ↔ OpenAI hop.

breaker:
  failure_threshold: 3           # Consecutive failures → open.
  cooldown_seconds: 60.0         # Dead time before half-open probe.

# ===== Model Pool (required) =====
# Each entry declares its own credentials — the pool does NOT inherit
# a shared `api_key`. For MiniMax nodes the `/anthropic` or `/v1` suffix
# is auto-appended based on provider.
pool:
  - node_id: primary
    provider: anthropic
    api_key: "YOUR_API_KEY_HERE"          # Or use `api_key_env: YOUR_ENV_VAR`
    api_base: "https://api.minimax.io"    # Global; use https://api.minimaxi.com in China
    model: MiniMax-M2.5
    priority: 100
    context_window: 128000
    max_output_tokens: 16384
    supports_tools: true
    supports_thinking: true

# # Example — three MiniMax models at different priorities:
# pool:
#   - node_id: minimax-m27
#     provider: anthropic
#     api_key: "sk-..."
#     api_base: https://api.minimax.io
#     model: MiniMax-M2.7
#     priority: 100
#   - node_id: minimax-m25
#     provider: anthropic
#     api_key: "sk-..."
#     api_base: https://api.minimax.io
#     model: MiniMax-M2.5
#     priority: 80
#   - node_id: minimax-m21
#     provider: anthropic
#     api_key: "sk-..."
#     api_base: https://api.minimax.io
#     model: MiniMax-M2.1
#     priority: 60
#
# # Example — cross-provider fallback (separate keys from env vars):
# pool:
#   - node_id: minimax-primary
#     provider: anthropic
#     api_key_env: MINIMAX_API_KEY
#     api_base: https://api.minimax.io
#     model: MiniMax-M2.5
#     priority: 100
#   - node_id: openai-backup
#     provider: openai
#     api_key_env: OPENAI_API_KEY
#     api_base: https://api.openai.com/v1
#     model: gpt-5
#     priority: 80

# ===== Agent Configuration =====
# Blessed form is a nested `agent:` block — it mirrors the object shape
# used at runtime (`config.agent.max_steps`, etc.). Writing these keys
# at the top level is still accepted as a legacy shim, but if you use
# both forms the nested block wins.
#
# `workspace_dir` is deliberately commented-out below — leaving it unset
# lets `mini-agent` fall back to the current working directory, which is
# what users who never touched the config expect. Uncomment (or pass
# `--workspace`) to pin a specific workspace.
agent:
  max_steps: 100              # Maximum execution steps
  # workspace_dir: "./workspace"
  system_prompt_path: "system_prompt.md"

# ===== Tools Configuration =====
tools:
  # Basic tool switches
  enable_file_tools: true  # File read/write/edit tools (ReadTool, WriteTool, EditTool)
  enable_bash: true        # Bash command execution tool
  enable_note: true        # Session note tool (SessionNoteTool)
  
  # Claude Skills
  enable_skills: true      # Enable Skills
  skills_dir: "./skills"   # Skills directory path
  
  # MCP Tools
  enable_mcp: true         # Enable MCP tools
  mcp_config_path: "mcp.json"  # MCP configuration file (same config directory)
                           # Note: API Keys for MCP tools are configured in mcp.json
  # MCP timeout configuration (prevents hanging on network issues)
  mcp:
    connect_timeout: 10.0    # Connection timeout in seconds (default: 10)
    execute_timeout: 60.0    # Tool execution timeout in seconds (default: 60)
    sse_read_timeout: 120.0  # SSE read timeout in seconds (default: 120)
